# Node.js 20 deprecation on GitHub Actions runners (effective Sep 2026):
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# Using Node 22 LTS for forward-compatibility.

name: CI

on:
  push:
    branches: ["main", "master", "develop", "**"]
  pull_request:
    branches: ["main", "master", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./apps/crm/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/crm

      - name: Run Unit Tests (Vitest)
        run: npx vitest run
        working-directory: ./apps/crm

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./apps/crm

      - name: Run E2E Tests (Playwright)
        run: npx playwright test
        working-directory: ./apps/crm

      - name: Build Application
        run: npm run build
        working-directory: ./apps/crm

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./apps/crm/test-results
          if-no-files-found: warn
          retention-days: 7