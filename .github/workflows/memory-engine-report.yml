name: Memory Engine report

on:
  pull_request:

permissions:
  contents: read

jobs:
  memory-engine:
    name: Memory Engine checks and advisory audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # brain:check compares committed indexes to ingest output; default PR merge
          # checkout changes git log metadata and causes false drift on merge commits.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck Memory Engine
        run: npm run brain:typecheck

      - name: Test Memory Engine
        run: npm run brain:test

      - name: Verify committed Brain views match repository
        run: npm run brain:check

      - name: Generate temporary Brain views
        run: npm run brain:ingest -- --brain-root "${{ runner.temp }}/brain"

      - name: Run advisory repository audit
        id: audit
        continue-on-error: true
        run: npm run brain:audit -- --brain-root "${{ runner.temp }}/brain" --output-dir "${{ runner.temp }}/brain-audit"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brain-audit-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: ${{ runner.temp }}/brain-audit
          retention-days: 14
          if-no-files-found: warn
