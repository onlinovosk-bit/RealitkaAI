name: Nightly — Playwright E2E

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-playwright
  cancel-in-progress: true

jobs:
  nightly-e2e:
    name: Nightly Playwright (extended)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/crm/package-lock.json

      - name: Install
        run: npm ci
        working-directory: apps/crm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: apps/crm

      - name: Export local credentials
        run: supabase status -o env | sed 's/"//g' >> "$GITHUB_ENV"
        working-directory: apps/crm

      - name: Map service role key for Node
        run: echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> "$GITHUB_ENV"
        env:
          SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}

      - name: Reset DB (migracie + seed.sql)
        run: supabase db reset
        working-directory: apps/crm

      - name: Lint
        run: npm run lint
        working-directory: apps/crm

      - name: Build
        run: npm run build
        working-directory: apps/crm
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/crm

      - name: Nightly Playwright (smoke + public + optional auth)
        run: |
          set -e
          npm run start &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/ > /dev/null; then
              echo "Server ready after ${i} attempt(s)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::next start did not become ready on :3000"
              exit 1
            fi
            sleep 2
          done
          npm run test:nightly:ci
          if [ -n "${TEST_USER_EMAIL:-}" ] && [ -n "${TEST_USER_PASSWORD:-}" ]; then
            echo "Auth secrets present — running chromium project"
            npx playwright test --project=chromium --reporter=line || echo "::warning::chromium auth suite failed (non-blocking)"
          else
            echo "Skipping chromium project — TEST_USER_EMAIL/PASSWORD not configured"
          fi
        working-directory: apps/crm
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY || env.SERVICE_ROLE_KEY }}
          CRON_SECRET: ci-smoke-cron-secret
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-${{ github.run_id }}
          path: |
            apps/crm/playwright-report/
            apps/crm/test-results/
          retention-days: 14
          if-no-files-found: ignore
