name: Auto-merge policy

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to evaluate
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: automerge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  evaluate:
    name: Auto-merge robot
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # check_suite: find open PR for head SHA
          SHA="${{ github.event.check_suite.head_sha }}"
          NUM=$(gh pr list --state open --json number,headRefOid --jq ".[] | select(.headRefOid==\"$SHA\") | .number" | head -1)
          if [ -z "$NUM" ]; then
            echo "No open PR for $SHA — skip"
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Run auto-merge policy
        if: steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node .github/scripts/automerge-policy.mjs
