name: CI - Revolis.AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/crm/package-lock.json

      - name: Install
        run: npm ci
        working-directory: apps/crm

      - name: Lint
        run: npm run lint
        working-directory: apps/crm

      - name: Test
        run: npm test
        working-directory: apps/crm

      - name: Build
        run: npm run build
        working-directory: apps/crm
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Debug - find .next
        run: |
          echo "=== Workspace root ==="
          ls -la ${{ github.workspace }}
          echo "=== apps/crm contents ==="
          ls -la ${{ github.workspace }}/apps/crm/
          echo "=== .next exists? ==="
          ls -la ${{ github.workspace }}/apps/crm/.next/ || echo "NOT FOUND"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: ${{ github.workspace }}/apps/crm/.next/
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: true
