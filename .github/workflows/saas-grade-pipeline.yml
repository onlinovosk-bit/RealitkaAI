name: CI - Revolis.AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Guard - legal-hold crons not in vercel.json
        run: |
          if grep -q 'stealth-recruiter-ingest' apps/crm/vercel.json; then
            echo "::error::stealth-recruiter-ingest must not be registered in vercel.json (GDPR legal hold)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/crm/package-lock.json

      - name: Install
        run: npm ci
        working-directory: apps/crm

      - name: Lint
        run: npm run lint
        working-directory: apps/crm

      # ── Ephemeral test DB: žiadne prod secrets v test/build fáze ──
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: apps/crm

      - name: Export local credentials
        run: |
          supabase status -o env | sed 's/"//g' >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> "$GITHUB_ENV"
        working-directory: apps/crm

      # Allowlist guard: fail, ak DB NIE JE lokálne test prostredie.
      # (Nahrádza pôvodný blacklist "Block E2E on production".)
      - name: Guard - testy len proti allowlistu test DB
        run: |
          case "$API_URL" in
            *127.0.0.1*|*localhost*)
              echo "Guard OK: $API_URL" ;;
            *)
              echo "::error::DB URL nie je v allowliste test prostredí - testy zablokované."
              exit 1 ;;
          esac

      - name: Reset DB (migracie + seed.sql)
        run: supabase db reset
        working-directory: apps/crm

      - name: Test
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
          grep -E "RLS tenant isolation|tests/rls/" test-output.log
          grep -q "RLS tenant isolation suite" test-output.log || (echo "::error::RLS suite did not execute — check vitest include for tests/rls/" && exit 1)
          grep -q "tests/rls/rls-tenant-isolation.test.ts" test-output.log || (echo "::error::RLS test file not in vitest output" && exit 1)
        working-directory: apps/crm
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: npm run build
        working-directory: apps/crm
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Debug - find .next
        run: |
          echo "=== Workspace root ==="
          ls -la ${{ github.workspace }}
          echo "=== apps/crm contents ==="
          ls -la ${{ github.workspace }}/apps/crm/
          echo "=== .next exists? ==="
          ls -la ${{ github.workspace }}/apps/crm/.next/ || echo "NOT FOUND"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: ${{ github.workspace }}/apps/crm/.next/
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: true
