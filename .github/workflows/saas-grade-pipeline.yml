# Monorepo CI/CD lives only here — GitHub does not run workflows under apps/*/ .github/
# Node 22 LTS (see GitHub runner deprecation timeline for Node 20)
name: RealitkaAI Monorepo CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, build, E2E
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/crm

    env:
      NODE_ENV: test
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/crm/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Fail-fast: cheap checks before Playwright
      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npx vitest run

      - name: Build (Next.js)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      # Only Chromium — matches playwright.config.ts projects (Desktop Chrome)
      - name: Install Playwright (Chromium + OS deps)
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npx playwright test --reporter=github
        continue-on-error: true

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/crm/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test-results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/crm/test-results
          if-no-files-found: ignore
          retention-days: 7

    - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/crm/.next
          if-no-files-found: error
          retention-days: 1
      env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/crm/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Deploy to Vercel
        run: npx vercel --prod --confirm

      - name: Smoke — production URL reachable
        env:
          SMOKE_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_URL:-}" ]; then
            echo "::error::NEXT_PUBLIC_APP_URL secret is empty; cannot verify deploy."
            exit 1
          fi
          curl -fsSL --retry 4 --retry-delay 3 --retry-all-errors -o /dev/null "$SMOKE_URL"
